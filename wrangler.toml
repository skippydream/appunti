# Configurazione del Worker (Cloudflare) — serve i file statici + l'API /api/state.
# Cloudflare "Workers Builds" legge questo file ad ogni deploy dal repo git.

name = "appunti"                  # deve combaciare col nome del tuo Worker
main = "worker.js"
compatibility_date = "2025-09-01"

# File statici del sito (tutta la cartella del progetto), esposti al Worker come env.ASSETS
[assets]
directory = "."
binding = "ASSETS"

# Namespace KV per la persistenza del progresso (env.STATE)
# Incolla qui l'ID del namespace KV che hai creato (Workers & Pages -> KV -> ID).
[[kv_namespaces]]
binding = "STATE"
id = "INCOLLA_QUI_L_ID_DEL_NAMESPACE_KV"
